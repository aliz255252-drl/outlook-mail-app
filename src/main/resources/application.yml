server:
  port: 8080

spring:
  application:
    name: outlook-mail-app
azure:
  tenant-id: ${AZURE_TENANT_ID:common}
  client-id: ${AZURE_CLIENT_ID}
  client-secret: ${AZURE_CLIENT_SECRET}
  sender-mailbox: ${AZURE_SENDER_MAILBOX:noreply@yourdomain.com}

# Microsoft Graph REST API base URL
graph:
  api:
    base-url: https://graph.microsoft.com/v1.0

logging:
  level:
    org.springframework.security: INFO
    com.example.outlookmail: DEBUG
